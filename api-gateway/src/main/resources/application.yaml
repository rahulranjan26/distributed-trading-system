spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/auth/**
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/inventory/**


server:
  port: 8080

jwt:
  secret: sdkjfadsknfkHFIFKDASFKkmasfsgfrekgfskjghdfsassnjbsvnabafgabsnbjasbfabvjnabvjs
  expiration: 900000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true


logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG